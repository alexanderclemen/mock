<!DOCTYPE html>
<html>
  <head>
    <title>Investigating Speechmarkers in People with Epilepsy</title>
    <script src="https://unpkg.com/jspsych@7.3.4"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.3"></script>
    <link href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css" rel="stylesheet" type="text/css" />
    <style>
      .experiment-header {
        position: fixed; top: 0; left: 0; width: 100%;
        background-color: #ffffff; border-bottom: 1px solid #eee;
        padding: 20px 0; z-index: 1000;
        display: flex; flex-direction: column; align-items: center;
      }
      .progress-container {
        width: 500px; height: 12px; background-color: #eee;
        border-radius: 6px; overflow: hidden; margin-top: 15px;
      }
      .progress-bar { width: 0%; height: 100%; background-color: #4caf50; }
      @keyframes fillProgress { from { width: 0%; } to { width: 100%; } }
      .jspsych-content-wrapper { padding-top: 100px; }
      .reading-box {
        max-width: 800px; text-align: left; font-family: 'Times New Roman', serif;
        font-size: 22px; line-height: 1.5; background: #fff;
        padding: 30px; border: 1px solid #ccc; box-shadow: 2px 2px 10px rgba(0,0,0,0.05);
        margin: 0 auto;
      }
      .text-container { max-width: 1200px; text-align: left; font-family: Arial; line-height: 1.6; }
      .password-container { padding: 40px; background: #f4f4f4; border-radius: 10px; border: 1px solid #ccc; }
      .password-input { padding: 10px; font-size: 18px; width: 250px; border-radius: 5px; border: 1px solid #999; margin-bottom: 10px; }
      .consent-box { background: #f9f9f9; padding: 15px; border: 1px solid #ddd; border-radius: 8px; }
      .consent-item { margin-bottom: 10px; display: flex; align-items: flex-start; }
      .consent-item input { margin-right: 15px; margin-top: 5px; transform: scale(1.2); }
      .stimulus-word { font-size: 42px; font-weight: normal; font-family: Arial; margin-bottom: 10px; }
      .stop-signal { color: #d9534f; font-size: 80px; font-weight: bold; }
      .pause-signal { font-size: 80px; font-weight: normal; }
      .sub-instruction { font-size: 18px; color: #666; font-style: italic; font-family: Arial; }
      .nav-hint { margin-top: 40px; font-size: 13px; color: #888; border-top: 1px solid #eee; padding-top: 10px; }
      .big-stimulus { font-size: 80px; font-weight: bold; }
      button { padding: 10px 20px; cursor: pointer; background: #4caf50; color: white; border: none; border-radius: 5px; font-size: 16px; }
      button:disabled { opacity: 0.5; cursor: not-allowed; }
      #error-msg { color: #d9534f; font-weight: normal; margin-bottom: 10px; display: none; }
    </style>
  </head>
  <body></body>

  <script>
    const jsPsych = initJsPsych();

    const STUDY_PASSWORD = "1234";

    let ddk_iteration = 1;

    const trials_data = [
      { type: 'login',
        category: `
          <div class="password-container">
            <h2>Login</h2>
            <p>Bitte geben Sie das Passwort ein, um die Studie zu starten:</p>
            <div id="error-msg">Falsches Passwort. Bitte versuchen Sie es erneut.</div>
            <input type="password" id="pw_field" class="password-input" placeholder="Passwort eingeben..."><br>
            <button onclick="checkPassword()">Anmelden</button>
          </div>`,
        duration: 0
      },

      { type: 'consent', 
        category: `
          <div class="text-container">
            <h2>Einverständniserklärung</h2>
            <p style="margin-bottom: 20px;">
              Bitte lesen Sie die vollständige 
                <a href="consent_form.pdf" target="_blank" style="color: #0056b3; text-decoration: underline;">
            Teilnehmerinformation (PDF)
          </a> 
          sorgfältig durch, bevor Sie fortfahren.
        </p>
            <div class="consent-box">
              <div class="consent-item">
                <input type="checkbox" id="consent_transcript" onchange="checkConsent()">
                <label for="consent_transcript"><strong>(Pflicht)</strong> Ich stimme der Veröffentlichung anonymisierter Transkripte zu.</label>
              </div>
              <div class="consent-item">
                <input type="checkbox" id="consent_audio">
                <label for="consent_audio"><strong>(Optional)</strong> Ich stimme der Veröffentlichung anonymisierter Audioaufnahmen zu.</label>
              </div>
            </div>
            <button id="start_btn" disabled onclick="advance()" style="margin-top:20px; padding: 10px 20px;">Akzeptieren und Weiter</button>
          </div>`, 
        duration: 0 
      },

      { type: 'Mikrofontest', 
        category: '', // Wird dynamisch befüllt
        <!-- subtext: 'Sprechen Sie kurz zur Probe und drücken Sie dann [ . ]', -->
        duration: 50000 
      },

      { type: 'Fragebogen',
        category: `
          <div class="text-container" style="text-align: center;">
            <h2>Fragebogen</h2>
            <p>Bevor wir mit den Sprechaufgaben beginnen müssen Sie noch einen kurzen Fragebogen auszufüllen.</p>
            
            <a href="https://HIERKOMMTNOCHEINLINKREIN.de/limesurvey/index.php/" 
               target="_blank" 
               style="display: inline-block; padding: 15px 25px; background-color: #0056b3; color: white; text-decoration: none; border-radius: 5px; margin: 20px 0; font-weight: normal;">
               Fragebogen öffnen
            </a>

            <p style="font-size: 16px; color: #555; margin-top: 20px;">
              Kehren Sie nach dem Ausfüllen zurück. und drücken Sie <strong>[ . ]</strong>, um mit der Studie fortzufahren.
            </p>
          </div>`,
        duration: 0
      },

      { type: 'Anweisung', category: 'Phase 1: Artikulation & Lesen', subtext: 'Drücken Sie [ . ] für den ersten Lesetext.', duration: 0 },
      { type: 'Anweisung', 
        category: `
          <div class="reading-box">
            <strong>Erklärung 1: Artikulation</strong><br><br>

            Bitte wiederholen Sie "pa-ta-ka" so schnell und deutlich wie möglich bis auf dem Bildschirm ein großes STOP zu sehen ist.<br><br>

              Ablauf: Wir führen insgesamt drei Durchläufe durch.<br>
              Dauer: Jeder Durchlauf dauert 10 Sekunden.<br>
              Pause: Zwischen jedem Durchläufen haben Sie Zeit zum durchzuatmen.<br><br>

              Holen sie vor jedem Durchlauf einmal tief Luft.
            </div>`,
        subtext: 'Drücken Sie [ . ] zum Starten.', 
        duration: 0 
      },
      
      // DDK BLOCK 1
      { type: 'DDK-Aktiv', category: '<span style="font-size: 80px;">pa - ta - ka</span>', duration: 10000, iteration: 1 },
      { type: 'Stop', category: '<div class="stop-signal">STOP</div>', subtext: 'Atmen Sie durch. Weiter mit [ . ] zu Durchgang 2.', duration: 0 },
      // DDK BLOCK 2
      { type: 'DDK-Aktiv', category: '<span style="font-size: 80px;">pa - ta - ka</span>', duration: 10000, iteration: 2 },
      { type: 'Stop', category: '<div class="stop-signal">STOP</div>', subtext: 'Atmen Sie durch. Weiter mit [ . ] zum letzten Durchgang.', duration: 0 },
      // DDK BLOCK 3
      { type: 'DDK-Aktiv', category: '<span style="font-size: 80px;">pa - ta - ka</span>', duration: 10000, iteration: 3 },
      { type: 'Stop', category: '<div class="stop-signal">STOP</div>', subtext: 'Sehr gut. Weiter mit [ . ].', duration: 0 },
      { type: 'Pause', category: '<div class="pause-signal">Brauchen Sie eine Pause?</div>', subtext: 'Weiter mit [ . ] zum nächsten Teil.', duration: 0 },

      { type: 'Anweisung', 
        category: `
          <div class="reading-box">
            <strong>Erklärung 1: Lesen</strong><br><br>

            Nun folgen zwei kurze Texte. Bitte lesen Sie diese nacheinander in einem angenehmen Tempo laut vor. <br><br>

            Es geht nicht um Schnelligkeit, sondern um einen natürlichen Lesefluss.<br>
            Falls sie einen Fehler machen wiederholen Sie bitte den ganzen Satz noch einmal.<br>
            Wenn sie mit dem ersten Text fertig sind drücken Sie auf [ . ], dann gibt es eine Pause.
          </div>`,
        subtext: 'Drücken Sie [ . ] zum Starten.', 
        duration: 0 
      },
      { type: 'Lesetext', 
        category: `
          <div class="reading-box">
            <strong>Der Tag am Bodensee</strong><br><br>
            Rita packt ihr Paket. Es ist spät, doch die Sonne scheint auf das Beet. Sie trägt einen Hut und geht zum Boot, das am Kai liegt. Ihr Hund Bodo bellt laut, als er ein Gebäck im Gras entdeckt. Sie sieht ein Boot im tiefen Wasser. Der Wind weht über das Kap. Sie isst einen Apfel und ein Stück Brot, während sie auf den Tag blickt. Plötzlich macht es patsch! Ein Ball ist in den Dreck gefallen. Bodo hat Glück und findet eine Puppe im Gebüsch. Rita lacht und ruft: „Guck mal!“ Alles ist gut. Der Staub auf dem Weg legt sich, und die Nacht kommt mit kühler Luft. Sie geht zurück in ihr Depot und träumt von einem Ritt auf dem Bock.
          </div>`, 
        <!--subtext: 'Bitte lesen Sie den Text ruhig und deutlich vor.',-->
        duration: 0 
      },
      { type: 'Pause', category: '<div class="pause-signal">Brauchen Sie eine Pause?</div>', subtext: 'Weiter mit [ . ] zum zweiten Text.', duration: 0 },

      { type: 'Lesetext',
        category: `
          <div class="reading-box">
            <strong>Nordwind und Sonne</strong><br><br>
            Einst stritten sich Nordwind und Sonne, wer von ihnen beiden wohl der Stärkere wäre, als ein Wanderer, der in einen warmen Mantel gehüllt war, des Weges daherkam. Sie wurden einig, dass derjenige für den Stärkeren gelten sollte, der den Wanderer zwingen würde, seinen Mantel abzunehmen. Der Nordwind blies mit aller Macht, aber je mehr er blies, desto fester hüllte sich der Wanderer in seinen Mantel ein. Endlich gab der Nordwind den Kampf auf. Nun erwärmte die Sonne die Luft mit ihren freundlichen Strahlen, und schon nach wenigen Augenblicken zog der Wanderer seinen Mantel aus. Da musste der Nordwind zugeben, dass die Sonne von ihnen beiden der Stärkere war.
          </div>`, 
        <!--subtext: 'Bitte lesen Sie den Text laut und deutlich vor.',-->
        duration: 0
      },
      { type: 'Pause', category: '<div class="pause-signal">Brauchen Sie eine Pause?</div>', subtext: 'Sehr gut. Weiter mit [ . ] zur Wortflüssigkeit.', duration: 0 },

      { type: 'Anweisung', category: 'Phase 2: Wortflüssigkeit', subtext: '1 Minute pro Aufgabe. Drücken Sie [ . ] zum Starten.', duration: 0 },
      { type: 'Anweisung', 
        category: `
          <div class="reading-box">
            Teil 1 von 3 ist geschafft!<br><br>

            Nun wird Ihnen entweder ein Buchstabe (z. B. "P") oder eine Kategorie (z.B. "Farben") angezeigt. Bitte nennen Sie so viele passende Wörter wie möglich, die mit diesem Buchstaben beginnen oder zur Kategorie passen.<br><br>
            
            Hinweis: Versuchen Sie, Wortwiederholungen zu vermeiden.<br><br>

            Dauer: Sie haben pro Durchgang 60 Sekunden Zeit. Dann kommt das STOP Signal.<br>
            Umfang: Insgesamt führen wir vier Durchläufe durch.<br>
            Pausen: Zwischen den Runden können Sie kurz verschnaufen.<br>

          </div>`,
        subtext: '1 Minute pro Aufgabe. Drücken Sie [ . ] zum Starten.', 
        duration: 0 
      },
      { type: 'Phonetisch', category: '<span style="font-size: 80px;">S</span>', duration: 60000 },
      { type: 'Stop', category: '<div class="stop-signal">STOP</div>', subtext: 'Atmen Sie durch. Weiter mit [ . ] zum nächsten Durchgang.', duration: 0 },
      { type: 'Pause', category: '<div class="pause-signal">Brauchen Sie eine Pause?</div>', subtext: 'Weiter mit [ . ].', duration: 0 },
      { type: 'Semantisch', category: '<span style="font-size: 80px;">Tiere</span>', duration: 60000 },
      { type: 'Stop', category: '<div class="stop-signal">STOP</div>', subtext: 'Atmen Sie durch. Weiter mit [ . ] zum nächsten Durchgang.', duration: 0 },
      { type: 'Pause', category: '<div class="pause-signal">Brauchen Sie eine Pause?</div>', subtext: 'Weiter mit [ . ].', duration: 0 },
      { type: 'Phonetisch', category: '<span style="font-size: 80px;">K</span>', duration: 60000 },
      { type: 'Stop', category: '<div class="stop-signal">STOP</div>', subtext: 'Atmen Sie durch. Weiter mit [ . ] zum letzten Durchgang.', duration: 0 },
      { type: 'Pause', category: '<div class="pause-signal">Brauchen Sie eine Pause?</div>', subtext: 'Weiter mit [ . ].', duration: 0 },
      { type: 'Semantisch', category: '<span style="font-size: 80px;">Berufe</span>', duration: 60000 },
      { type: 'Stop', category: '<div class="stop-signal">STOP</div>', subtext: 'Atmen Sie durch. Weiter mit [ . ] zum letzten Durchgang.', duration: 0 },
      //      { type: 'Phonetisch', category: 'Buchstabe: P', duration: 60000 },
      //      { type: 'Semantisch', category: 'Lebensmittel', duration: 60000 },

      { type: 'Anweisung', category: 'Phase 3: Freies Sprechen', subtext: '5 Minuten pro Frage. Drücken Sie [ . ] zum Starten.', duration: 0 },
      { type: 'Anweisung', 
        category: `
          <div class="reading-box">
            Sie haben den letzten Teil erreicht.<br><br>

            Es wird ihnen auf dem Bildschirm eine Frage angezeigt. Bitte reden sie 5 Minuten über diese Frage.<br><br>

            Hinweis: Es gibt kein „Richtig“ oder „Falsch“. Erzählen Sie einfach alles, was Ihnen zu diesem Thema einfällt bis die Zeit abgelaufen ist.<br><br>

            Umfang: Es werden Ihnen zwei Fragen angezeigt.
          </div>`,
        subtext: 'Drücken Sie [ . ] zum Starten.', duration: 0 },
        
      { type: 'Freies Sprechen', category: 'Kindheitserinnerung', duration: 300000 },
      { type: 'Stop', category: '<div class="stop-signal">STOP</div>', subtext: 'Atmen Sie durch. Weiter mit [ . ].', duration: 0 },
      { type: 'Pause', category: '<div class="pause-signal">Brauchen Sie eine Pause?</div>', subtext: 'Sehr gut. Weiter mit [ . ] zum freien Sprechen.', duration: 0 },
        
      { type: 'Freies Sprechen', category: 'Kindheitserinnerung', duration: 300000 },
      { type: 'Stop', category: '<div class="stop-signal">STOP</div>', subtext: 'Atmen Sie durch. Weiter mit [ . ].', duration: 0 },
      { type: 'Pause', category: '<div class="pause-signal">Brauchen Sie eine Pause?</div>', subtext: 'Sehr gut. Weiter mit [ . ] zum freien Sprechen.', duration: 0 },
      
      { type: 'Anweisung', 
        category: `
          <div class="reading-box">
            Letzte Aufgabe:<br><br>

            Bitte geben Sie die Geschichte "Nordwind und Sonne", die Sie am Anfang vorgelesen haben, so detailliert wie möglich mit Ihren eigenen Worten wieder.<br><br>
            
            Dafür gibt es keine Mindest oder Maximalzeit.
          </div>`,
          subtext: 'Drücken Sie [ . ] zum Starten.', duration: 0 },
      { type: 'Nacherzählung', category: 'Nordwind und Sonne', duration: 0 },
      { type: 'Ende', category: '<h2>Vielen Dank!</h2>', duration: 0 }
    ];

    let current_index = 0;
    window.checkPassword = function() {
      const input = document.getElementById('pw_field').value;
      if (input === STUDY_PASSWORD) {
        current_index++;
        jsPsych.finishTrial();
      } else {
        document.getElementById('error-msg').style.display = 'block';
        document.getElementById('pw_field').value = '';
      }
    };
    window.checkConsent = function() {
      const required = document.getElementById('consent_transcript').checked;
      document.getElementById('start_btn').disabled = !required;
    };

    window.advance = function() {
      jsPsych.data.addProperties({
        consent_transcript: document.getElementById('consent_transcript').checked,
        consent_audio: document.getElementById('consent_audio').checked
      });
      current_index++;
      jsPsych.finishTrial();
    };

    const master_loop = {
      timeline: [{
        type: jsPsychHtmlKeyboardResponse,
        stimulus: function() {
          //
          const item = trials_data[current_index];
            let displayCategory = item.category;

            // Spezielle Logik für den Mikrofontest
            if (item.type === 'Mikrofontest') {
              // Wir holen den Wert direkt aus den jsPsych-Daten
              const audio_consent = jsPsych.data.get().select('consent_audio').values[0];

              if (audio_consent === true) {
                displayCategory = `
                  <div class="text-container" style="border: 2px solid #666; padding: 10px; border-radius: 10px;">
                    <h3 style="color: #666;">Mikrofon test</h3>
                    <p>Bitte lesen sie folgendes vor: <i>Das ist ein Text. Oben ist eine Zeitleiste die anzeigt, wie lange dieser Bildschirm noch offen bleibt. Ich kann das Experiment mit den Tasten Punkt [ . ] und Komma [ , ] steuern. Punkt steht für "weiter" und Komma für "zurück".</i></p>
                    <p>Drücken Sie nun <i>[ . ]</i> um diesen Bildschirm vorzeitig zu beenden</p>
                  </div>`;
              } else {
                displayCategory = `
                  <div class="text-container" style="border: 2px solid #666; padding: 20px; border-radius: 10px;">
                    <h3 style="color: #666;">Mikrofon test</h3>
                    <p>Bitte lesen sie folgendes vor: <i>Das ist ein Text. Ich kann das Experiment mit den Tasten Punkt [ . ] und Komma  [ , ] steuern. Punkt steht für weiter und Komma für zurück. Oben ist eine Zeitleiste die anzeigt, wie lange dieser Bildschirm noch offen bleibt. </i></p>
                    <p>Drücken Sie nun <i>[ . ]</i> um diesen Bildschirm vorzeitig zu beenden</p>
                  </div>`;
              }
            }
          //
          
//          const item = trials_data[current_index];
          const hasTime = item.duration > 0;
          const seconds = item.duration / 1000;
          
          let header = item.type.toUpperCase();
          if(item.iteration) header += ` (DURCHGANG ${item.iteration} VON 3)`;

          return `
            <div class="experiment-header">
              <div style="text-transform: uppercase; color: #666; letter-spacing: 1px;">${header}</div>
              ${hasTime ? `<div class="progress-container"><div class="progress-bar" style="animation: fillProgress ${seconds}s linear forwards;"></div></div>` : ''}
            </div>
            <div class="stimulus-word">${displayCategory}</div>
            ${item.subtext ? `<div class="sub-instruction">${item.subtext}</div>` : ''}
            ${item.type !== 'login' && item.type !== 'consent' && item.type !== 'DDK-Aktiv' && current_index < trials_data.length - 1 ? 
              `<div class="nav-hint">Weiter mit [ . ] ${current_index > 0 ? '| Zurück mit [ , ]' : ''}</div>` : ''}
          `;
        },
        choices: function() {
          const type = trials_data[current_index].type;
          if (type === 'login' || type === 'consent' || type === 'DDK-Aktiv') return "NO_KEYS";
          return [',', '.'];
        },
        trial_duration: function() {
          return trials_data[current_index].duration > 0 ? trials_data[current_index].duration : null;
        },
        on_finish: function(data) {
          const type = trials_data[current_index].type;
          if (type === 'login' || type === 'consent') return;

          if (data.response === '.') current_index++;
          else if (data.response === ',') current_index = Math.max(0, current_index - 1);
          else if (data.response === null) current_index++; // Automatisch weiter nach Zeitablauf (DDK/Fluency)
        }
      }],
      loop_function: function() {
        return current_index < trials_data.length;
      }
    };

    jsPsych.run([master_loop]);
  </script>
</html>
